<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A97D3"/>
      <stop offset="100%" stop-color="#3B7BB0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Logo -->
  <g transform="translate(420,180)">
    <rect x="0" y="0" width="100" height="100" rx="18" fill="#4A97D3"/>
    <rect x="80" y="20" width="100" height="100" rx="18" fill="#9DCD08"/>
    <rect x="160" y="0" width="100" height="100" rx="18" fill="#F79A2E"/>
    <rect x="240" y="20" width="100" height="100" rx="18" fill="#FF4A3A"/>

    <text x="50" y="65" text-anchor="middle" font-size="60" font-weight="700" fill="#fff" font-family="Arial">K</text>
    <text x="130" y="85" text-anchor="middle" font-size="60" font-weight="700" fill="#fff" font-family="Arial">I</text>
    <text x="210" y="65" text-anchor="middle" font-size="60" font-weight="700" fill="#fff" font-family="Arial">D</text>
    <text x="290" y="85" text-anchor="middle" font-size="60" font-weight="700" fill="#fff" font-family="Arial">Z</text>
  </g>

  <!-- Text Content -->
  <text x="600" y="120" text-anchor="middle" font-size="32" fill="#ffffff" font-family="Arial" opacity="0.9">
    Premium pediatric care in Peshawar
  </text>

  <text x="600" y="400" text-anchor="middle" font-size="64" font-weight="700" fill="#ffffff" font-family="Arial">
    Kidz Hospital
  </text>

  <text x="600" y="450" text-anchor="middle" font-size="28" fill="#ffffff" font-family="Arial" opacity="0.95">
    Warm, reassuring care for infants, children, and families.
  </text>

  <text x="600" y="500" text-anchor="middle" font-size="22" fill="#ffffff" font-family="Arial" opacity="0.8">
    Static website ready for modern pediatric hospital branding.
  </text>
</svg>
